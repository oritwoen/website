features:
  headline: what I do
  title: "chain internals → developer DX"
  description: >
    Crypto security research, blockchain infra, and the TypeScript/Rust tooling
    that holds it all together.
  items:
    - icon: i-lucide-shield-check
      title: Crypto Security
      description: >
        ECDSA nonce analysis, lattice attacks (HNP), GPU-accelerated Pollard's Kangaroo
        for secp256k1 ECDLP, SHA/RIPEMD/Keccak hash reversal.
    - icon: i-lucide-blocks
      title: Blockchain
      description: >
        Hands-on since 2016: Ethereum Classic, Bitcoin, Solana, Nervos, Polkadot.
        Wallets, puzzle solvers, Bitcoin.pl headless frontend.
    - icon: i-lucide-wrench
      title: Dev Tooling
      description: >
        TypeScript libraries — skilld (agent skillgen), omnichron (web archives),
        retriv (local-first search), gixa (unified git API).
    - icon: i-lucide-cpu
      title: Rust Systems
      description: >
        Performance-critical: kangaroo (GPU ECDLP), vgen (vanity addresses),
        vuke (vulnerable key research), vusi (ECDSA vuln analysis), shaha (hash DB).
    - icon: i-lucide-layout
      title: Frontend & Fullstack
      description: >
        Production Nuxt apps — bitcoin.pl headless CMS, component libraries,
        GraphQL integrations, e-commerce backends.
    - icon: i-lucide-server
      title: DevOps
      description: >
        Arch Linux, Docker, systemd, CI/CD pipelines, IPX-based CDN infra.

metrics:
  headline: track record
  title: "open-source since 2016"
  description: >
